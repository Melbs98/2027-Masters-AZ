<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>2027 Masters Draft & Scoreboard AZ</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="wrap">
    <header class="page-header">
      <h1>2026 Masters Draft & Scoreboard AZ</h1>
      <p id="updated">Loading latest update...</p>
    </header>

    <section class="section-card">
      <h2>Team Standings</h2>
      <div id="teams-grid" class="teams-grid"></div>
    </section>

    <section class="section-card">
  <h2>Payouts</h2>
  <div id="payouts-list"></div>
</section>

<div style="position:relative; display:flex; justify-content:center; margin-top:20px;">
  <img 
    src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExd3Q2Yzk5OXR3enFwb2d4enhkMmptN241aWF4aDhuam1sMW5xYXIxZiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/l4Fsly71gEOtGvLQA/giphy.gif" 
    style="width:400px; max-width:100%; border-radius:12px;"
  >

  <div style="
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:white;
    text-shadow: 2px 2px 4px black;
  ">
    Fuck you, Roth!
  </div>
</div>

    <section class="section-card">
      <h2>All Player Scores</h2>
      <table id="scores-table">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Player</th>
            <th>Score</th>
            <th>Today</th>
            <th>Thru</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
